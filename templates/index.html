<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arbitrage Trading Dashboard</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f3f8ff, #e4f0e8);
            color: #12202f;
        }

        main {
            width: min(680px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 18px 40px rgba(18, 32, 47, 0.12);
        }

        h1 {
            margin-top: 0;
            font-size: clamp(2rem, 4vw, 2.8rem);
        }

        p {
            line-height: 1.6;
        }

        code {
            padding: 2px 6px;
            border-radius: 6px;
            background: #eef3f8;
        }
    </style>
</head>
<body>
    <main>
        <h1>Arbitrage Trading Dashboard</h1>
        <p>The FastAPI app is up and serving the placeholder dashboard.</p>
        <p>Current mode: <strong>{% if use_mock %}mock{% else %}live{% endif %}</strong></p>
        <p>Replace <code>templates/index.html</code> with the real dashboard when you are ready.</p>
    </main>
</body>
</html>
